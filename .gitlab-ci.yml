# CI pipeline: validate and test only.
# Deployment is handled by Vercel Git Integration (auto-deploy on push to main).
# This eliminates the Vercel CLI api-upload-free rate limit issue.

stages:
  - validate
  - test

validate:
  stage: validate
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline
    - echo "Running lint..."
    - npm run lint
    - echo "Running type check..."
    - npx tsc --noEmit
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 10 minutes

test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline
    - echo "Running tests..."
    - npm run test:run
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 10 minutes
