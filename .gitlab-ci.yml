stages:
  - validate
  - test
  - deploy
  - preview

variables:
  VERCEL_CLI_VERSION: "39.3.0"

validate:
  stage: validate
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline
    - echo "Running lint..."
    - npm run lint
    - echo "Running type check..."
    - npx tsc --noEmit
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 10 minutes

test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline
    - echo "Running tests..."
    - npm run test:run
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 10 minutes

deploy:
  stage: deploy
  image: node:20
  needs:
    - validate
    - test
  script:
    - npm install -g vercel@${VERCEL_CLI_VERSION}
    - echo "Vercel version:" && vercel --version
    - echo "Pulling project..."
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN 2>&1
    - echo "Building..."
    - vercel build --prod --token=$VERCEL_TOKEN 2>&1
    - echo "Deploying..."
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN 2>&1
  environment:
    name: production
    url: https://vaxtimyoxdu.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  timeout: 15 minutes

preview:
  stage: preview
  image: node:20-alpine
  before_script:
    - npm install --global vercel@39.3.0
  script:
    - vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
    - vercel build --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --token=$VERCEL_TOKEN | tee /tmp/preview_url.txt
    - echo "Preview URL:" && cat /tmp/preview_url.txt
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    url: $PREVIEW_URL
    on_stop: stop_preview
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 15m
  cache:
    key: vercel-preview-${CI_COMMIT_REF_SLUG}
    paths:
      - .vercel/

stop_preview:
  stage: preview
  image: alpine:latest
  script:
    - echo "Preview environment stopped"
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
  allow_failure: true
