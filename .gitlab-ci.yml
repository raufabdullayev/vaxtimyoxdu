stages:
  - build
  - deploy

variables:
  NODE_ENV: production

build:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - .next/
      - out/
      - public/
      - package.json
      - package-lock.json
      - next.config.js

deploy:
  stage: deploy
  image: node:20
  dependencies:
    - build
  before_script:
    - npm install -g wrangler
    - npm ci --omit=dev
  script:
    - npx @cloudflare/next-on-pages
    - wrangler pages deploy .vercel/output/static --project-name=vaxtimyoxdu --branch=main
  environment:
    name: production
    url: https://vaxtimyoxdu.com
  only:
    - main
