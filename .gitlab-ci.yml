stages:
  - build
  - deploy

variables:
  HUGO_VERSION: "0.157.0"
  HUGO_ENV: production

build:
  stage: build
  image: golang:1.23-alpine
  before_script:
    - apk add --no-cache git curl libc6-compat
    - curl -L https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz | tar xz -C /usr/local/bin
  script:
    - hugo --minify
  artifacts:
    paths:
      - public/

deploy:
  stage: deploy
  image: node:20-alpine
  dependencies:
    - build
  before_script:
    - npm install -g wrangler
  script:
    - wrangler pages deploy public --project-name=vaxtimyoxdu
  environment:
    name: production
    url: https://vaxtimyoxdu.com
  only:
    - main
