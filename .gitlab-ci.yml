# CI pipeline: validate and test only.
# Deployment is handled by Vercel Git Integration (auto-deploy on push to main).
# This eliminates the Vercel CLI api-upload-free rate limit issue.

stages:
  - validate
  - build
  - test

validate:
  stage: validate
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline
    - echo "Running lint..."
    - npm run lint
    - echo "Running type check..."
    - npx tsc --noEmit
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 10 minutes

build:
  stage: build
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .next/cache/
  script:
    - npm ci --prefer-offline
    - echo "Running Next.js build..."
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 15 minutes

test:
  stage: test
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --prefer-offline
    - echo "Running tests with coverage..."
    - npm run test:coverage
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 10 minutes
