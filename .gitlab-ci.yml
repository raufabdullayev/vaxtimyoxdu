stages:
  - build
  - deploy

variables:
  HUGO_ENV: production

build:
  stage: build
  image:
    name: hugomods/hugo:exts
    entrypoint: [""]
  before_script:
    - git submodule sync --recursive
    - git submodule update --init --recursive
  script:
    - hugo --minify
  artifacts:
    paths:
      - public/

deploy:
  stage: deploy
  image: node:20
  dependencies:
    - build
  before_script:
    - npm install -g wrangler
  script:
    - wrangler pages deploy public --project-name=vaxtimyoxdu --branch=main
  environment:
    name: production
    url: https://vaxtimyoxdu.com
  only:
    - main
